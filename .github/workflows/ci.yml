name: FraudGen CI Pipeline

# 1. EVENT trigger when?
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# 2. JOBS what?
jobs:
  build-and-test:
    # 3. RUNNER: where?
    runs-on: ubuntu-latest

    # 4. STEPS: 
    steps:
      # Step A: take the code from repo
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step B:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin' 

      # Step C: cache gradle for faster use
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Step D: Compile
      - name: Build and run tests
        run: ./gradlew build --no-daemon

      # (Opzionale) Step E: load report tests
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always() # do this step even if it fails the former one
        with:
          name: junit-test-report
          path: build/reports/tests/test/