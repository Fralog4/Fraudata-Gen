services:
  fraudgen-api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: fraudgen-api-container
    ports:
      - "8080:8080"
    volumes:
      # Mappiamo una cartella locale per poter vedere i file JSON/CSV generati!
      - ./generated-data:/app
    environment:
      - TZ=Europe/Rome
      # KOTLIN HOCON MAGIC: Sovrascriviamo le variabili dell'application.conf
      - PORT=8080
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
    restart: unless-stopped
    
  db:
    image: postgres:16-alpine
    container_name: fraudgen-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=fraudgen_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  # Il server Kafka (Immagine Ufficiale Apache)
  kafka:
    image: apache/kafka:3.7.0
    container_name: local-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1

  # Una bellissima interfaccia grafica web per vedere cosa c'è dentro Kafka!
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=LocalKafka
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka

volumes:
  postgres_data: